{% extends "layout.html" %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">
    <div class="bg-white rounded-xl border border-slate-200 p-6 sm:p-8">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Новый пароль</h1>
            <p class="text-sm text-slate-500 mt-2">Введите новый пароль для вашего аккаунта</p>
        </div>

        {% if error_msg %}
        <div class="mb-6 bg-red-50 border border-red-100 text-red-600 text-sm px-4 py-3 rounded-lg text-center">
            {{ error_msg }}
        </div>
        {% endif %}

        <form action="{{ url_for('admin.profile.password') }}" method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ request.session.csrf_token }}">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5 tracking-wider">Новый пароль</label>
                <input type="password" name="new_password" required minlength="6"
                       class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5 tracking-wider">Подтверждение пароля</label>
                <input type="password" name="confirm_password" required minlength="6"
                       class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">
                Сменить пароль
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="/sirius.achievements/profile?active_tab=security" class="text-xs text-slate-500 hover:text-indigo-600 transition-colors">Отмена</a>
        </div>
    </div>
</div>
{% endblock %}
