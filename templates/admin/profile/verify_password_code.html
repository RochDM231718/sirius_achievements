{% extends "layout.html" %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">
    <div class="bg-white rounded-xl border border-slate-200 p-6 sm:p-8">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Подтверждение</h1>
            <p class="text-sm text-slate-500 mt-2 leading-relaxed">
                Код отправлен на <span class="font-medium text-slate-800">{{ email }}</span>. Проверьте папку "Спам".
            </p>
        </div>

        {% if error_msg %}
        <div class="mb-6 bg-red-50 border border-red-100 text-red-600 text-sm px-4 py-3 rounded-lg text-center">
            {{ error_msg }}
        </div>
        {% endif %}

        <form action="{{ url_for('admin.profile.password.verify') }}" method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ request.session.csrf_token }}">
            <div>
                <input type="text" name="code" required placeholder="------" maxlength="6" autofocus autocomplete="off"
                       class="w-full px-4 py-3 text-center text-3xl tracking-[0.4em] font-mono bg-slate-50 border border-slate-200 rounded-lg text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all placeholder:text-slate-300">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">
                Подтвердить
            </button>
        </form>

        <form action="{{ url_for('admin.profile.password.resend') }}" method="POST" id="resendForm" class="mt-6 text-center">
            <input type="hidden" name="csrf_token" value="{{ request.session.csrf_token }}">
            <button type="submit" id="resendBtn" disabled
                    class="text-xs text-slate-400 cursor-not-allowed font-medium transition-colors">
                Отправить код повторно <span id="timer">({{ seconds_left }})</span>
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="/sirius.achievements/profile?active_tab=security" class="text-xs text-slate-500 hover:text-indigo-600 transition-colors">Отмена</a>
        </div>
    </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    var timeLeft = {{ seconds_left }};
    var timerSpan = document.getElementById('timer');
    var resendBtn = document.getElementById('resendBtn');
    function updateTimer() {
        if (timeLeft <= 0) {
            resendBtn.disabled = false;
            resendBtn.classList.remove('text-slate-400', 'cursor-not-allowed');
            resendBtn.classList.add('text-indigo-600', 'hover:text-indigo-800', 'cursor-pointer');
            resendBtn.textContent = "Отправить код повторно";
        } else {
            timerSpan.textContent = '(' + timeLeft + ')';
            timeLeft--;
            setTimeout(updateTimer, 1000);
        }
    }
    updateTimer();
</script>
{% endblock %}
