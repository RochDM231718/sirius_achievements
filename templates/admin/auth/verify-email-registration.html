<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подтверждение email | Sirius.Achievements</title>

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='icon.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', path='icon.png') }}">
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.tailwindcss.com"></script>
    {% include "partials/theme_head.html" %}
</head>
<body class="theme-auth-page bg-slate-50 antialiased font-sans min-h-screen flex items-center justify-center p-4">
    {% include "partials/theme_toggle_floating.html" %}

    <div class="theme-auth-card w-full max-w-sm bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Подтверждение email</h1>
            <p class="text-sm text-slate-500 mt-2 leading-relaxed">
                Код отправлен на <span class="font-medium text-slate-800">{{ email }}</span>. Проверьте папку "Спам".
            </p>
        </div>

        {% if info_msg %}
        <div class="mb-4 bg-indigo-50 border border-indigo-100 text-indigo-700 text-sm px-4 py-3 rounded-lg text-center">
            {{ info_msg }}
        </div>
        {% endif %}

        {% if error_msg %}
        <div class="mb-6 bg-red-50 border border-red-100 text-red-600 text-sm px-4 py-3 rounded-lg text-center">
            {{ error_msg }}
        </div>
        {% endif %}

        <form action="{{ url_for('admin.auth.verify_email') }}" method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ request.session.csrf_token }}">

            <div>
                <input type="text" name="code" required placeholder="------" maxlength="6" autofocus autocomplete="off"
                       class="w-full px-4 py-3 text-center text-3xl tracking-[0.4em] font-mono bg-slate-50 border border-slate-200 rounded-lg text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 outline-none transition-all placeholder:text-slate-300">
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">
                Подтвердить
            </button>
        </form>

        <form action="{{ url_for('admin.auth.resend_verify_email') }}" method="POST" id="resendForm" class="mt-6 text-center">
            <input type="hidden" name="csrf_token" value="{{ request.session.csrf_token }}">
            <button type="submit" id="resendBtn" disabled
                    class="text-xs text-slate-400 cursor-not-allowed font-medium transition-colors">
                Отправить код повторно <span id="timer">({{ seconds_left }})</span>
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{{ url_for('admin.auth.login_page') }}" class="text-xs text-slate-400 hover:text-indigo-600 transition-colors">Уже подтвердили? Войти</a>
        </div>
    </div>

    <script nonce="{{ request.state.csp_nonce }}">
        let timeLeft = {{ seconds_left }};
        const timerSpan = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');

        function updateTimer() {
            if (timeLeft <= 0) {
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-slate-400', 'cursor-not-allowed');
                resendBtn.classList.add('text-indigo-600', 'hover:text-indigo-800', 'cursor-pointer');
                resendBtn.textContent = "Отправить код повторно";
            } else {
                timerSpan.textContent = `(${timeLeft})`;
                timeLeft--;
                setTimeout(updateTimer, 1000);
            }
        }

        updateTimer();
    </script>
</body>
</html>
