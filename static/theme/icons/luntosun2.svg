<svg width="128" height="128" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" style="color:#8f7cff">
  <defs>
    <mask id="moonMaskB" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="black"/>
      <circle cx="50" cy="50" r="18.5" fill="white"/>
      <circle cx="61.5" cy="46" r="16.5" fill="black">
        <animate attributeName="cx" values="61.5;72;88" dur="0.96s" fill="freeze"
          calcMode="spline" keyTimes="0;0.42;1"
          keySplines="0.22 0.61 0.36 1;0.22 0.61 0.36 1"/>
        <animate attributeName="cy" values="46;48;50" dur="0.96s" fill="freeze"
          calcMode="spline" keyTimes="0;0.42;1"
          keySplines="0.22 0.61 0.36 1;0.22 0.61 0.36 1"/>
      </circle>
    </mask>
  </defs>

  <g mask="url(#moonMaskB)" opacity="1">
    <circle cx="50" cy="50" r="18.5" fill="currentColor"/>
    <animate attributeName="opacity" values="1;1;0" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.52;0.76"
      keySplines="0.2 0.8 0.2 1;0.2 0.8 0.2 1"/>
  </g>

  <circle cx="50" cy="50" r="18.5" stroke="currentColor" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.3;0" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.26;0.48;0.72"
      keySplines="0.2 0.8 0.2 1;0.2 0.8 0.2 1;0.2 0.8 0.2 1"/>
    <animate attributeName="r" values="18.5;18.5;24;28" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.26;0.48;0.72"
      keySplines="0.2 0.8 0.2 1;0.2 0.8 0.2 1;0.2 0.8 0.2 1"/>
  </circle>

  <circle cx="50" cy="50" r="18.5" stroke="currentColor" stroke-width="5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.38;0.66;1"
      keySplines="0.2 0.8 0.2 1;0.22 0.61 0.36 1;0.2 0.8 0.2 1"/>
  </circle>

  <g transform="translate(50 50)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.44;0.66;1"
      keySplines="0.2 0.8 0.2 1;0.22 0.61 0.36 1;0.2 0.8 0.2 1"/>

    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-20;5;0" dur="0.96s" fill="freeze"
        calcMode="spline" keyTimes="0;0.78;1"
        keySplines="0.2 0.8 0.2 1;0.22 0.61 0.36 1"/>

      <g stroke="currentColor" stroke-width="5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="scale"
          values="0.15;1.14;1" dur="0.96s" fill="freeze"
          calcMode="spline" keyTimes="0;0.78;1"
          keySplines="0.25 0.9 0.3 1;0.22 0.61 0.36 1"/>

        <line x1="0" y1="-27" x2="0" y2="-35"/>
        <line x1="19.1" y1="-19.1" x2="24.8" y2="-24.8"/>
        <line x1="27" y1="0" x2="35" y2="0"/>
        <line x1="19.1" y1="19.1" x2="24.8" y2="24.8"/>
        <line x1="0" y1="27" x2="0" y2="35"/>
        <line x1="-19.1" y1="19.1" x2="-24.8" y2="24.8"/>
        <line x1="-27" y1="0" x2="-35" y2="0"/>
        <line x1="-19.1" y1="-19.1" x2="-24.8" y2="-24.8"/>
      </g>
    </g>
  </g>
</svg>
