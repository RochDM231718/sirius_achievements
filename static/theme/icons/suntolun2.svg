<svg width="128" height="128" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" style="color:#8f7cff">
  <defs>
    <mask id="moonMaskA" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="black"/>
      <circle cx="50" cy="50" r="18.5" fill="white"/>
      <circle cx="88" cy="50" r="16.5" fill="black">
        <animate attributeName="cx" values="88;70;61.5" dur="0.96s" fill="freeze"
          calcMode="spline" keyTimes="0;0.55;1"
          keySplines="0.22 0.61 0.36 1;0.22 0.61 0.36 1"/>
        <animate attributeName="cy" values="50;48;46" dur="0.96s" fill="freeze"
          calcMode="spline" keyTimes="0;0.55;1"
          keySplines="0.22 0.61 0.36 1;0.22 0.61 0.36 1"/>
      </circle>
    </mask>
  </defs>

  <g transform="translate(50 50)" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="1">
    <line x1="0" y1="-27" x2="0" y2="-35"/>
    <line x1="19.1" y1="-19.1" x2="24.8" y2="-24.8"/>
    <line x1="27" y1="0" x2="35" y2="0"/>
    <line x1="19.1" y1="19.1" x2="24.8" y2="24.8"/>
    <line x1="0" y1="27" x2="0" y2="35"/>
    <line x1="-19.1" y1="19.1" x2="-24.8" y2="24.8"/>
    <line x1="-27" y1="0" x2="-35" y2="0"/>
    <line x1="-19.1" y1="-19.1" x2="-24.8" y2="-24.8"/>

    <animateTransform attributeName="transform" additive="sum" type="scale"
      values="1;1.08;0.15" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.28;1"
      keySplines="0.25 0.9 0.3 1;0.2 0.7 0.3 1"/>
    <animate attributeName="opacity" values="1;1;0" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.22;1"
      keySplines="0.2 0.8 0.2 1;0.2 0.8 0.2 1"/>
  </g>

  <circle cx="50" cy="50" r="18.5" stroke="currentColor" stroke-width="5" opacity="1">
    <animate attributeName="opacity" values="1;1;0" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.22;0.72"
      keySplines="0.2 0.8 0.2 1;0.2 0.8 0.2 1"/>
    <animate attributeName="r" values="18.5;17.7;18.5" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.34;1"
      keySplines="0.22 0.61 0.36 1;0.22 0.61 0.36 1"/>
  </circle>

  <g mask="url(#moonMaskA)" opacity="0">
    <circle cx="50" cy="50" r="18.5" fill="currentColor"/>
    <animate attributeName="opacity" values="0;0.08;1" dur="0.96s" fill="freeze"
      calcMode="spline" keyTimes="0;0.35;1"
      keySplines="0.2 0.8 0.2 1;0.22 0.61 0.36 1"/>
  </g>
</svg>
