services:
  web:
    build: .
    container_name: sirius_app_new
    restart: always
    ports:
      - "127.0.0.1:8081:8000"               # nginx будет проксировать сюда
    env_file:
      - .env
    environment:
      # Адреса сервисов на ПК (через VPN)
      - DB_HOST=10.8.0.2
      - DB_PORT=5433
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:?DB_NAME is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@10.8.0.2:6379
      - MINIO_ENDPOINT=http://10.8.0.2:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-sirius-files}
      - AI_SERVICE_URL=http://10.8.0.2:8001
      - TZ=Europe/Moscow
    volumes:
      - uploads_data:/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - prod_net
    # Зависимости от удалённых сервисов убраны, но можно оставить для порядка
    depends_on:
      - nginx   # формально

  nginx:
    image: nginx:alpine
    container_name: sirius_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - prod_net
      - jenkins_net

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/sirius_achievements:/root/sirius_achievements
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    networks:
      - jenkins_net

volumes:
  uploads_data:
  jenkins_home:

networks:
  prod_net:
    driver: bridge
  jenkins_net:
    driver: bridge
