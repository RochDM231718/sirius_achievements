services:
  db:
    image: postgres:15-alpine
    container_name: sirius_db_new
    restart: always
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-sirius_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sirius_password}
      POSTGRES_DB: ${DB_NAME:-sirius_db}
      TZ: Europe/Moscow
    volumes:
      - postgres_data_new:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sirius_user} -d ${DB_NAME:-sirius_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sirius_redis_new
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-sirius_redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sirius_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: sirius_app_new
    restart: always
    ports:
      - "8081:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USERNAME=${DB_USERNAME:-sirius_user}
      - DB_PASSWORD=${DB_PASSWORD:-sirius_password}
      - DB_NAME=${DB_NAME:-sirius_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sirius_redis_pass}@redis:6379
      - TZ=Europe/Moscow
    volumes:
      - uploads_data:/app/static/uploads
      - ./models:/app/easyocr_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data_new:
  uploads_data:
