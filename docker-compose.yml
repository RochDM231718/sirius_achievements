services:
db:
image: postgres:15-alpine
container_name: sirius_db_new
restart: always
ports:
- "127.0.0.1:5433:5432"
environment:
POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
TZ: Europe/Moscow
volumes:
- postgres_data_new:/var/lib/postgresql/data
healthcheck:
test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
interval: 10s
timeout: 5s
retries: 5
networks:
- prod_net

redis:
image: redis:7-alpine
container_name: sirius_redis_new
restart: always
command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
healthcheck:
test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
interval: 10s
timeout: 5s
retries: 5
networks:
- prod_net

minio:
image: minio/minio:latest
container_name: sirius_minio
restart: always
command: server /data --console-address ":9001"
environment:
MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
volumes:
- minio_data:/data
ports:
- "127.0.0.1:9000:9000"
- "127.0.0.1:9001:9001"
healthcheck:
test: ["CMD", "mc", "ready", "local"]
interval: 30s
timeout: 10s
retries: 3
start_period: 10s
networks:
- prod_net

web:
build: .
container_name: sirius_app_new
restart: always
ports:
- "127.0.0.1:8081:8000"
depends_on:
db:
condition: service_healthy
redis:
condition: service_healthy
minio:
condition: service_started
env_file:
- .env
environment:
- DB_HOST=db
- DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
- DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
- DB_NAME=${DB_NAME:?DB_NAME is required}
- REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
- MINIO_ENDPOINT=http://minio:9000
- MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
- MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
- MINIO_BUCKET=${MINIO_BUCKET:-sirius-files}
- TZ=Europe/Moscow
volumes:
- uploads_data:/app/static/uploads
- ./models:/app/easyocr_models
healthcheck:
test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
interval: 30s
timeout: 10s
retries: 3
start_period: 15s
networks:
- prod_net

nginx:
image: nginx:alpine
container_name: sirius_nginx
restart: always
ports:
- "80:80"
- "443:443"
volumes:
- ./nginx/conf.d:/etc/nginx/conf.d:ro
- /etc/letsencrypt:/etc/letsencrypt:ro
depends_on:
- web
networks:
- prod_net
- jenkins_net  # чтобы проксировать jenkins тоже

jenkins:
image: jenkins/jenkins:lts
container_name: jenkins
restart: unless-stopped
user: root
volumes:
- jenkins_home:/var/jenkins_home
- /var/run/docker.sock:/var/run/docker.sock
      - /root/sirius_achievements:/root/sirius_achievements
environment:
- JAVA_OPTS=-Djenkins.install.runSetupWizard=true
networks:
- jenkins_net

volumes:
postgres_data_new:
uploads_data:
minio_data:
jenkins_home:

networks:
prod_net:
driver: bridge
jenkins_net:
driver: bridge
